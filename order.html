<div id="checkoutModal" class="modal">

  <div class="modal-content">

    <span class="close" onclick="closeCheckout()">&times;</span>

    <h2>🧾 Checkout</h2>

    <input type="text" id="custName" placeholder="Nama Anda">
    <input type="text" id="custPhone" placeholder="No Telefon">
    <textarea id="custAddress" placeholder="Alamat"></textarea>

    <h3>Order Summary</h3>
    <div id="checkoutItems"></div>

    <h3>Total: RM <span id="checkoutTotal">0</span></h3>

    <button onclick="sendOrderWhatsApp()" class="send-btn">
      Confirm & Send WhatsApp
    </button>

  </div>

</div>

<button class="checkout-btn" onclick="openCheckout()">
  🧾 Checkout
</button>
